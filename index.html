<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Worm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game">
    <header class="game__header">
      <h1 class="game__title">Worm</h1>
      <div class="scoreboard">
        <div class="scoreboard__item">
          <span class="scoreboard__label">Score</span>
          <span class="scoreboard__value" id="score">0</span>
        </div>
        <div class="scoreboard__item">
          <span class="scoreboard__label">Best</span>
          <span class="scoreboard__value" id="best">0</span>
        </div>
      </div>
    </header>

    <div class="board-wrap">
      <canvas id="board" class="board" width="400" height="400"></canvas>

      <div class="overlay" id="overlay">
        <div class="overlay__content">
          <h2 class="overlay__title" id="overlayTitle">Ready?</h2>
          <p class="overlay__text" id="overlayText">Use the arrow keys or WASD to move.</p>
          <button class="btn" id="startBtn">Play</button>
        </div>
      </div>
    </div>

    <p class="hint">Arrow keys / WASD to steer &middot; Space to pause</p>
  </main>

  <script src="game.js"></script>
</body>
</html>
